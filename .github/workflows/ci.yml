name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar:
    name: Verificación
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobar tipos
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Comprobar formato
        run: npm run format:check

      - name: Pruebas
        run: npm run test:run

      - name: Compilar
        run: npm run build
